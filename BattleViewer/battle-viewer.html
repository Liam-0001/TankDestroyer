<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TankDestroyer — Battle Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #e8ff00;
      --accent2: #ff3c3c;
      --text: #d0d0d0;
      --muted: #555566;
      --win: #39ff14;
      --loss: #ff3c3c;
      --stale: #e8ff00;
      --crash: #ff8800;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(232,255,0,0.3);
    }

    h1 span { color: var(--accent2); }

    #status-badge {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      padding: 4px 12px;
      border-radius: 2px;
      background: var(--surface);
      border: 1px solid var(--muted);
      color: var(--muted);
      transition: all 0.3s;
    }

    #status-badge.connected { border-color: var(--win); color: var(--win); box-shadow: 0 0 8px rgba(57,255,20,0.2); }
    #status-badge.error { border-color: var(--loss); color: var(--loss); }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 32px;
    }

    .control-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 16px;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }

    button#start-btn {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      padding: 11px 32px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    button#start-btn:hover { background: #fff; box-shadow: 0 0 20px rgba(232,255,0,0.4); }
    button#start-btn:disabled { background: var(--muted); cursor: not-allowed; box-shadow: none; }

    .stats-section { display: none; flex-direction: column; gap: 16px; }
    .stats-section.visible { display: flex; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.15em;
      color: var(--accent);
    }

    #result-count {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    thead th.num { text-align: right; }

    tbody tr {
      border-bottom: 1px solid rgba(30,30,46,0.5);
      transition: background 0.15s;
      animation: rowIn 0.3s ease both;
    }

    tbody tr:hover { background: rgba(232,255,0,0.03); }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    td {
      padding: 10px 12px;
      font-size: 0.85rem;
    }

    td.num { text-align: right; }
    td.wins { color: var(--win); font-weight: bold; }
    td.losses { color: var(--loss); }
    td.stalemates { color: var(--stale); }
    td.crashes { color: var(--crash); }

    .bot-name { display: flex; align-items: center; gap: 10px; }
    .color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .log-section { display: flex; flex-direction: column; gap: 12px; }

    #log {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px;
      font-size: 0.72rem;
      color: var(--muted);
      height: 160px;
      overflow-y: auto;
      line-height: 1.7;
    }

    #log .entry { animation: fadeIn 0.2s ease; }
    #log .entry.ok { color: var(--win); }
    #log .entry.err { color: var(--loss); }
    #log .entry.info { color: var(--accent); }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>

<header>
  <h1>Tank<span>Destroyer</span> — Battle Viewer</h1>
  <div id="status-badge">DISCONNECTED</div>
</header>

<main>
  <div class="control-panel">
    <div class="field">
      <label>MAP NAME (leeg = alle maps)</label>
      <input type="text" id="map-input" placeholder="bijv. Desert" />
    </div>
    <div class="field">
      <label>MAX TURNS</label>
      <input type="number" id="turns-input" value="200" min="1" />
    </div>
    <button id="start-btn" disabled>START BATTLE</button>
  </div>

  <div class="log-section">
    <div id="log"></div>
  </div>

  <div class="stats-section" id="stats-section">
    <div class="section-header">
      <span class="section-title">LEADERBOARD</span>
      <span id="result-count">0 results</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>BOT</th>
          <th>MAP</th>
          <th class="num">WINS</th>
          <th class="num">LOSSES</th>
          <th class="num">STALEMATES</th>
          <th class="num">CRASHES</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
  </div>
</main>

<script>
  const API_BASE = 'https://localhost:7234';
  const badge = document.getElementById('status-badge');
  const startBtn = document.getElementById('start-btn');
  const logEl = document.getElementById('log');
  const resultsBody = document.getElementById('results-body');
  const statsSection = document.getElementById('stats-section');
  const resultCount = document.getElementById('result-count');

  let resultRows = [];

  function addLog(msg, type = '') {
    const div = document.createElement('div');
    div.className = `entry ${type}`;
    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
  }

  // SignalR
  const connection = new signalR.HubConnectionBuilder()
    .withUrl(`${API_BASE}/battlehub`)
    .withAutomaticReconnect()
    .build();

  connection.on('ReceiveResult', (result) => {
    resultRows.push(result);
    resultCount.textContent = `${resultRows.length} results`;
    statsSection.classList.add('visible');
    renderRow(result);
    addLog(`Result: ${result.mapName} — ${result.botInfo?.map(b => b.name).join(' vs ')}`, '');
  });

  connection.onreconnecting(() => {
    badge.textContent = 'RECONNECTING...';
    badge.className = '';
    addLog('Reconnecting...', 'err');
  });

  connection.onreconnected(() => {
    badge.textContent = 'CONNECTED';
    badge.className = 'connected';
    addLog('Reconnected', 'ok');
  });

  connection.start()
    .then(() => {
      badge.textContent = 'CONNECTED';
      badge.className = 'connected';
      startBtn.disabled = false;
      addLog('Connected to BattleHub', 'ok');
    })
    .catch(err => {
      badge.textContent = 'ERROR';
      badge.className = 'error';
      addLog('Connection failed: ' + err, 'err');
    });

  // Start battle
  startBtn.addEventListener('click', async () => {
    const mapName = document.getElementById('map-input').value.trim();
    const maxTurns = parseInt(document.getElementById('turns-input').value) || 200;

    startBtn.disabled = true;
    resultRows = [];
    resultsBody.innerHTML = '';
    resultCount.textContent = '0 results';

    try {
      const res = await fetch(`${API_BASE}/api/battle`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mapName: mapName || null, maxTurns })
      });

      if (res.ok) {
        addLog(`Battle gestart — MaxTurns: ${maxTurns}${mapName ? ', Map: ' + mapName : ', alle maps'}`, 'info');
      } else {
        const text = await res.text();
        addLog(`Fout: ${res.status} — ${text}`, 'err');
      }
    } catch (err) {
      addLog('Request mislukt: ' + err, 'err');
    } finally {
      startBtn.disabled = false;
    }
  });

  function renderRow(result) {
    const survivors = result.bots?.filter(t => !t.destroyed) ?? [];
    const isStalemate = result.isStalemate;

    (result.botInfo ?? []).forEach(bot => {
      const tank = result.bots?.find(t => t.ownerId === bot.ownerId);
      let wins = 0, losses = 0, stalemates = 0, crashes = 0;

      if (result.hasCrashed) { crashes++; losses++; }
      else if (result.bots?.every(b => b.destroyed)) { /* draw */ }
      else if (isStalemate && tank && !tank.destroyed) stalemates++;
      else if (survivors.length === 1 && survivors[0].ownerId === bot.ownerId) wins++;
      else losses++;

      // Check if row exists
      const existingRow = document.querySelector(`tr[data-bot="${CSS.escape(bot.name)}"]`);
      if (existingRow) {
        existingRow.querySelector('.w').textContent = parseInt(existingRow.querySelector('.w').textContent) + wins;
        existingRow.querySelector('.l').textContent = parseInt(existingRow.querySelector('.l').textContent) + losses;
        existingRow.querySelector('.s').textContent = parseInt(existingRow.querySelector('.s').textContent) + stalemates;
        existingRow.querySelector('.c').textContent = parseInt(existingRow.querySelector('.c').textContent) + crashes;
      } else {
        const color = bot.color?.startsWith('#') ? bot.color : `#${bot.color ?? '888'}`;
        const tr = document.createElement('tr');
        tr.dataset.bot = bot.name;
        tr.innerHTML = `
          <td><div class="bot-name"><span class="color-dot" style="background:${color}"></span>${bot.name}</div></td>
          <td>${result.mapName ?? '—'}</td>
          <td class="num wins w">${wins}</td>
          <td class="num losses l">${losses}</td>
          <td class="num stalemates s">${stalemates}</td>
          <td class="num crashes c">${crashes}</td>
        `;
        resultsBody.appendChild(tr);
      }
    });
  }
</script>
</body>
</html>
